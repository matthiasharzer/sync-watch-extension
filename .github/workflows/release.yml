name: Release

on:
  push:
    branches:
      - "main"

permissions:
    contents: write
    packages: write


jobs:
  get-next-version:
    name: Get next version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      hasNextVersion: ${{ steps.get-next-version.outputs.hasNextVersion }}
      version: ${{ steps.get-next-version.outputs.version }}

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get next version
        id: get-next-version
        uses: thenativeweb/get-next-version@2.7.1

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: get-next-version

    # Don't run just after creating repo from template
    if: github.run_number != 1 && needs.get-next-version.outputs.hasNextVersion == 'true'

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.FORCE_PUSH_TOKEN }}
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24.x
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
      - name: Run QA
        run: |
          make qa
      - name: Bump version in manifest.json
        run: |
          NEW_VERSION="${{ needs.get-next-version.outputs.version }}"

          sed -i -E 's/("version"[[:space:]]*:[[:space:]]*")[^"]+"/\1'"$NEW_VERSION"'"/' public/manifest.json

          echo "Bumped manifest version to $NEW_VERSION"
      - name: Commit and Push version bump
        run: |
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git config --global user.name "${{ github.actor }}"

          git add public/manifest.json

          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: bump version to ${{ needs.get-next-version.outputs.version }}"
            git push
          else
            echo "No changes to commit."
          fi
      - name: Create new version
        run: |
          git tag v${{needs.get-next-version.outputs.version}}
          git push origin v${{needs.get-next-version.outputs.version}}
      - name: Build artifacts
        run: |
          make build
      - name: Package Extension (Zip)
        run: |
          cd public
          zip -r ../sync-watch-extension.zip .
          cd ..
      - name: Release new version
        uses: ncipollo/release-action@v1
        with:
          artifacts: sync-watch-extension.zip
          tag: v${{ needs.get-next-version.outputs.version }}
          generateReleaseNotes: true

